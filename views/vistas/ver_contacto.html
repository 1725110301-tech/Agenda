$def with (contacto)
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Ver Contacto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" href="/">📒 Mi Agenda</a>
        <div>
            <a href="/contactos" class="btn btn-outline-light me-2">Contactos</a>
            <a href="/nuevo" class="btn btn-light">+ Nuevo</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0">Detalles del Contacto</h4>
                </div>
                <div class="card-body">
                    <p><strong>Nombre:</strong> ${contacto['nombre']}</p>
                    <p><strong>Teléfono:</strong> ${contacto['telefono']}</p>
                    <p><strong>Email:</strong> ${contacto['email']}</p>
                    <p><strong>Dirección:</strong> ${contacto['direccion']}</p>
                </div>
                <div class="card-footer">
                    <a href="/editar/${contacto['id']}" class="btn btn-warning me-2">Editar</a>
                    <a href="/contactos" class="btn btn-secondary">Volver</a>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
