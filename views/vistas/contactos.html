$def with (contactos)
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Lista de Contactos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" href="/">📒 Mi Agenda</a>
        <div>
            <a href="/contactos" class="btn btn-outline-light me-2">Contactos</a>
            <a href="/nuevo" class="btn btn-light">+ Nuevo</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Contactos</h2>
        <a href="/nuevo" class="btn btn-success">+ Nuevo Contacto</a>
    </div>

    $if not contactos:
        <div class="alert alert-warning">No hay contactos registrados todavía.</div>
    $else:
        <table class="table table-striped table-hover">
            <thead class="table-dark">
                <tr>
                    <th>#</th>
                    <th>Nombre</th>
                    <th>Teléfono</th>
                    <th>Email</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                $for c in contactos:
                    <tr>
                        <td>${c['id']}</td>
                        <td>${c['nombre']}</td>
                        <td>${c['telefono']}</td>
                        <td>${c['email']}</td>
                        <td>
                            <a href="/contacto/${c['id']}" class="btn btn-sm btn-info">Ver</a>
                            <a href="/editar/${c['id']}" class="btn btn-sm btn-warning">Editar</a>
                            <form action="/borrar/${c['id']}" method="post" style="display:inline">
                                <a href="/borrar/${c['id']}" class="btn btn-sm btn-danger">Borrar</a>
                            </form>
                        </td>
                    </tr>
            </tbody>
        </table>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
