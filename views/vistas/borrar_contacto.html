$def with (contacto)
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Borrar Contacto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" href="/">📒 Mi Agenda</a>
        <div>
            <a href="/contactos" class="btn btn-outline-light me-2">Contactos</a>
            <a href="/nuevo" class="btn btn-light">+ Nuevo</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card border-danger">
                <div class="card-header bg-danger text-white">
                    <h4 class="mb-0">¿Borrar contacto?</h4>
                </div>
                <div class="card-body">
                    <p>¿Estás seguro de que quieres borrar a <strong>${contacto['nombre']}</strong>?</p>
                    <p class="text-muted mb-0">Esta acción no se puede deshacer.</p>
                </div>
                <div class="card-footer d-flex gap-2">
                    <form action="/borrar/${contacto['id']}" method="post">
                        <button type="submit" class="btn btn-danger">Sí, borrar</button>
                    </form>
                    <a href="/contactos" class="btn btn-secondary">Cancelar</a>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
